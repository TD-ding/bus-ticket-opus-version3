<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>畅行汽车票 · 购票首页</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🚌 畅行汽车票</div>
    <nav class="nav">
      <a href="index.html" class="active">购票</a>
      <a href="orders.html">我的订单</a>
      <span id="userBox" class="user-box"></span>
    </nav>
  </header>

  <main class="container">
    <section class="search-card">
      <h2>查询班次</h2>
      <form id="searchForm" class="search-form">
        <div class="field">
          <label>出发城市</label>
          <select id="fromCity"><option value="">不限</option></select>
        </div>
        <div class="field">
          <label>到达城市</label>
          <select id="toCity"><option value="">不限</option></select>
        </div>
        <div class="field">
          <label>出发日期</label>
          <input type="date" id="departDate" />
        </div>
        <button type="submit" class="btn-primary">查询</button>
      </form>
    </section>

    <section class="results">
      <div id="resultList" class="result-list"></div>
      <div id="emptyHint" class="empty-hint" style="display:none;">暂无符合条件的班次</div>
    </section>
  </main>

  <!-- 登录/注册弹窗 -->
  <div id="authModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="modal-close" id="authClose">&times;</span>
      <h3 id="authTitle">登录</h3>
      <input type="text" id="authUsername" placeholder="用户名" />
      <input type="password" id="authPassword" placeholder="密码" />
      <button id="authSubmit" class="btn-primary">登录</button>
      <p class="modal-switch">
        <span id="authSwitchText">还没有账号？</span>
        <a href="#" id="authSwitch">去注册</a>
      </p>
    </div>
  </div>

  <!-- 下单弹窗 -->
  <div id="bookModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="modal-close" id="bookClose">&times;</span>
      <h3>确认购票</h3>
      <div id="bookInfo" class="book-info"></div>
      <input type="text" id="passengerName" placeholder="乘车人姓名" />
      <label class="inline-label">购票数量
        <input type="number" id="seatCount" value="1" min="1" max="5" />
      </label>
      <button id="bookSubmit" class="btn-primary">确认下单</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
